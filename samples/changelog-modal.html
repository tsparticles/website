<!-- Changelog / Storage version modal -->
<div
    class="modal fade modal-playground"
    id="changelogModal"
    tabindex="-1"
    role="dialog"
    aria-labelledby="changelogLabel"
    aria-hidden="true"
>
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="changelogLabel">Playground Storage Changelog</h5>
                <button class="close" type="button" data-dismiss="modal" aria-label="Close"></button>
                <span aria-hidden="true">&times;</span>
            </div>
            <div class="modal-body">
                <p><strong>Current storage version:</strong> <span id="changelogVersion">?</span></p>
                <hr />
                <div id="changelogContent">
                    <p>No changelog available.</p>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" type="button" data-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>
